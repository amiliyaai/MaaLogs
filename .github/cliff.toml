[remote.github]
owner = "amiliyaai"
repo = "MaaLogs"

[changelog]
header = """
# 更新日志
"""
body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% macro print_commit(commit) -%}
    - {% if commit.breaking %}[**breaking**] {% endif %}\
        {{ commit.message | split(pat="\\n") | first | upper_first }} \
        {% if commit.github.username %} @{{ commit.github.username }}{% else %} {{ commit.author.name }}{% endif %}
{% endmacro -%}

{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
    ## 未发布
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        {{ self::print_commit(commit=commit) }}
    {% endfor -%}
{% endfor -%}
"""
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->✨ 新功能" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug修复" },
    { message = "^docs", group = "<!-- 4 -->📚 文档" },
    { message = "^perf", group = "<!-- 3 -->🚀 性能优化" },
    { message = "^(refactor|rft)", group = "<!-- 2 -->🚜 代码重构" },
    { message = "^style", group = "<!-- 5 -->🎨 样式" },
    { message = "^test", group = "<!-- 6 -->🧪 测试" },
    { message = "^chore\\(deps\\)", group = "📦 依赖更新" },
    { message = "^chore", group = "<!-- 8 -->🔧 日常维护" },
    { message = "^ci", group = "<!-- 7 -->⚙️ 持续集成" },
    { body = ".*security", group = "<!-- 9 -->🔒 安全" },
    { message = "^revert", group = "<!-- 10 -->◀️ 撤销" },
]
ignore_tags = ""
sort_commits = "oldest"
